<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>4位數密碼破解助手（僅1或2）</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f1a;
      color: #e0e0ff;
      margin: 0;
      padding: 20px;
      line-height: 1.6;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #1a1a2e;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    h1 { text-align: center; color: #a78bfa; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #94a3b8; margin-bottom: 24px; }
    #guess-display {
      font-size: 3.5rem;
      font-weight: bold;
      text-align: center;
      letter-spacing: 16px;
      background: #2d2d44;
      padding: 20px;
      border-radius: 12px;
      margin: 24px 0;
      min-height: 100px;
    }
    
    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 360px;
      margin: 32px auto;
    }
    
    .number-btn {
      width: 100%;
      aspect-ratio: 1 / 1;
      font-size: 3rem;
      font-weight: bold;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.18s;
      box-shadow: 0 6px 16px rgba(79,70,229,0.35);
    }
    .number-btn:hover {
      background: #6366f1;
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(79,70,229,0.5);
    }
    
    .undo-btn {
      width: 140px;
      height: 56px;
      font-size: 1.3rem;
      background: #f59e0b;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      margin: 16px auto;
      display: block;
    }
    .undo-btn:hover { background: #d97706; transform: translateY(-2px); }
    .undo-btn:disabled { background: #4b5563; cursor: not-allowed; opacity: 0.6; }
    
    #status {
      margin: 20px 0;
      padding: 14px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .success { background: #10b981; color: white; }
    .error   { background: #ef4444; color: white; }
    .info    { background: #3b82f6; color: white; }
    
    #history {
      margin-top: 28px;
      padding: 16px;
      background: #111827;
      border-radius: 10px;
      max-height: 340px;
      overflow-y: auto;
    }
    .history-item {
      margin: 10px 0;
      padding: 10px;
      background: #1f2937;
      border-radius: 8px;
    }
    
    .reset-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #94a3b8;
      text-decoration: underline;
      cursor: pointer;
      font-size: 1rem;
    }
    .reset-link:hover { color: #cbd5e1; }
  </style>
</head>
<body>

<div class="container">
  <h1>4位數密碼破解助手</h1>
  <p class="subtitle">密碼只由 1 和 2 組成　遊戲回饋：正確位置且正確數字的個數（0–3）</p>

  <div id="guess-display">按下方數字開始</div>

  <div class="controls">
    <button class="number-btn" data-value="0">0</button>
    <button class="number-btn" data-value="1">1</button>
    <button class="number-btn" data-value="2">2</button>
    <button class="number-btn" data-value="3">3</button>
  </div>

  <button id="undo-btn" class="undo-btn" disabled>回到上一步</button>

  <div id="status" class="info">準備開始！（16 種可能）</div>

  <div id="history">
    <strong>猜測歷史：</strong><br>
  </div>

  <div class="reset-link" id="reset-link">重新開始</div>
</div>

<script>
// 狀態堆疊，用來支援撤銷
let historyStack = [];

let possibilities = [
  "1111","1112","1121","1122","1211","1212","1221","1222",
  "2111","2112","2121","2122","2211","2212","2221","2222"
];

let currentGuess = null;
let guessCount = 0;

const historyDiv    = document.getElementById("history");
const statusDiv     = document.getElementById("status");
const guessDisplay  = document.getElementById("guess-display");
const resetLink     = document.getElementById("reset-link");
const undoBtn       = document.getElementById("undo-btn");
const numberButtons = document.querySelectorAll(".number-btn");

function getRemainingText() {
  return `（${possibilities.length} 種可能剩下）`;
}

function pickGuess() {
  if (possibilities.length === 0) return "????";
  return possibilities[0];
}

function countMatches(code, guess) {
  let matches = 0;
  for (let i = 0; i < 4; i++) {
    if (code[i] === guess[i]) matches++;
  }
  return matches;
}

function saveState() {
  historyStack.push({
    possibilities: [...possibilities],
    currentGuess: currentGuess,
    guessCount: guessCount,
    historyHTML: historyDiv.innerHTML
  });
}

function updateGuess() {
  currentGuess = pickGuess();
  guessDisplay.textContent = currentGuess;
  guessCount++;
  statusDiv.textContent = `建議輸入：${currentGuess}  ${getRemainingText()}`;
  statusDiv.className = "info";
}

function addToHistory(guess, correct) {
  const item = document.createElement("div");
  item.className = "history-item";
  item.innerHTML = `第 ${guessCount} 猜：${guess} → 正確 ${correct} 個`;
  historyDiv.appendChild(item);
  historyDiv.scrollTop = historyDiv.scrollHeight;
}

function filterPossibilities(correct) {
  possibilities = possibilities.filter(code => countMatches(code, currentGuess) === correct);
}

function showSolved() {
  guessDisplay.textContent = currentGuess;
  statusDiv.textContent = `破解成功！密碼就是 ${currentGuess}  ${getRemainingText()} （共 ${guessCount} 次）`;
  statusDiv.className = "success";
  guessDisplay.style.color = "#34d399";
}

function handleCorrect(correct) {
  saveState();
  addToHistory(currentGuess, correct);
  filterPossibilities(correct);

  if (possibilities.length === 1) {
    currentGuess = possibilities[0];
    showSolved();
  } else if (possibilities.length === 0) {
    statusDiv.textContent = `錯誤：已無可能組合 ${getRemainingText()}，請檢查輸入`;
    statusDiv.className = "error";
  } else {
    updateGuess();
  }

  undoBtn.disabled = false;
}

function undoLastStep() {
  if (historyStack.length === 0) return;

  const prev = historyStack.pop();
  possibilities = prev.possibilities;
  currentGuess = prev.currentGuess;
  guessCount = prev.guessCount;
  historyDiv.innerHTML = prev.historyHTML;

  guessDisplay.textContent = currentGuess;
  guessDisplay.style.color = "";
  statusDiv.textContent = `已撤銷 → 回到：${currentGuess}  ${getRemainingText()}`;
  statusDiv.className = "info";

  if (historyStack.length === 0) {
    undoBtn.disabled = true;
  }
}

// 初始化
updateGuess();

// 綁定 0/1/2/3 按鈕
numberButtons.forEach(btn => {
  btn.addEventListener("click", () => {
    const value = parseInt(btn.dataset.value);
    handleCorrect(value);
  });
});

// 撤銷
undoBtn.addEventListener("click", undoLastStep);

// 重新開始
resetLink.addEventListener("click", () => {
  possibilities = ["1111","1112","1121","1122","1211","1212","1221","1222","2111","2112","2121","2122","2211","2212","2221","2222"];
  currentGuess = null;
  guessCount = 0;
  historyStack = [];
  historyDiv.innerHTML = "<strong>猜測歷史：</strong><br>";
  guessDisplay.style.color = "";
  undoBtn.disabled = true;
  updateGuess();
});
</script>

</body>
</html>
